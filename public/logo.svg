<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Background -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A5FC1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6B7FD9;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Rounded square background -->
  <rect x="5" y="5" width="90" height="90" rx="18" fill="url(#bgGradient)"/>
  
  <!-- Brain left side -->
  <g transform="translate(25, 35)">
    <!-- Brain curves -->
    <path d="M 15 5 Q 18 8 18 12 Q 18 15 14 16 Q 12 16 11 14" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M 10 10 Q 8 12 8 15 Q 8 18 11 19" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M 5 12 Q 3 14 3 17 Q 3 20 6 21" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    
    <!-- Brain main shape -->
    <ellipse cx="10" cy="15" rx="8" ry="10" fill="white" opacity="0.9"/>
  </g>
  
  <!-- Heart right side -->
  <g transform="translate(45, 30)">
    <!-- Heart shape -->
    <path d="M 12 35 C 20 27 28 20 28 14 C 28 8 24 4 19 4 C 16 4 13 6 12 9 C 11 6 8 4 5 4 C 0 4 -4 8 -4 14 C -4 20 4 27 12 35 Z" fill="white" opacity="0.9" transform="scale(0.8) translate(5, -8)"/>
  </g>
</svg>